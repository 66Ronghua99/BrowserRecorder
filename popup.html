<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }

    h3 {
      margin-bottom: 16px;
      font-size: 16px;
      color: #333;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #666;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .row label {
      margin-bottom: 0;
    }

    /* Toggle Switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle input:checked + .toggle-slider {
      background-color: #4285f4;
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    /* Select */
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }

    /* Range Slider */
    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4285f4;
      cursor: pointer;
    }

    .range-value {
      text-align: right;
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #4285f4;
      color: white;
    }

    .btn-primary:hover {
      background: #3367d6;
    }

    .btn-danger {
      background: #f5f5f5;
      color: #666;
      border: 1px solid #ddd;
      margin-top: 8px;
    }

    .btn-danger:hover {
      background: #e8e8e8;
    }

    /* Recording Button */
    .recording-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #ddd;
    }

    .recording-status {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: #666;
      min-height: 20px;
    }

    .recording-dot {
      display: none;
      width: 10px;
      height: 10px;
      background: #f44336;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }

    .recording-dot.active {
      display: inline-block;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .btn-record {
      background: #f44336;
      color: white;
    }

    .btn-record:hover {
      background: #d32f2f;
    }

    .btn-stop {
      background: #ff9800;
      color: white;
    }

    .btn-stop:hover {
      background: #f57c00;
    }
  </style>
</head>
<body>
  <h3>Camera Overlay</h3>

  <!-- 显示开关 -->
  <div class="control-group">
    <div class="row">
      <label>显示悬浮窗</label>
      <label class="toggle">
        <input type="checkbox" id="showOverlay" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- 窗口大小 -->
  <div class="control-group">
    <label>窗口大小</label>
    <select id="windowSize">
      <option value="small">小 (160x120)</option>
      <option value="medium" selected>中 (200x150)</option>
      <option value="large">大 (280x210)</option>
      <option value="xlarge">特大 (360x270)</option>
    </select>
  </div>

  <!-- 画面缩放 -->
  <div class="control-group">
    <label>画面缩放</label>
    <input type="range" id="zoomLevel" min="1" max="3" step="0.1" value="1">
    <div class="range-value" id="zoomValue">1.0x</div>
  </div>

  <!-- 圆角样式 -->
  <div class="control-group">
    <label>窗口样式</label>
    <select id="borderRadius">
      <option value="0">方形</option>
      <option value="10" selected>圆角 (10px)</option>
      <option value="50">圆形</option>
    </select>
  </div>

  <!-- 镜像模式 -->
  <div class="control-group">
    <div class="row">
      <label>镜像模式</label>
      <label class="toggle">
        <input type="checkbox" id="mirrorMode">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- 保存按钮 -->
  <button class="btn btn-primary" id="saveBtn">保存设置</button>

  <!-- 录制控制 -->
  <div class="recording-section">
    <div class="recording-status">
      <span class="recording-dot" id="recordingDot"></span>
      <span id="recordingStatusText"></span>
    </div>
    <button class="btn btn-record" id="recordBtn">开始录制</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
